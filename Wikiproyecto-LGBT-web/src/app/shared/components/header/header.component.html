<nav class="navbar navbar-expand-lg navbar-light bg-body-tertiary">
    <div class="container-fluid">
        <div class="brand-icon-and-title" routerLink="/home">
            <a class="navbar-brand">
                <div class="barba-icon-container"><img src="assets/imgs/Barbas/barba_{{barba}}.svg" alt="">
                </div>
            </a>
            <span class="navbar-title"><span class="WMLGBT">WMLGBT+ </span><span class="en-espanol">en
                    español</span></span>
        </div>


        <!-- Language switcher + menu toggle: kept outside the collapse so they
             stay reachable on every screen. order-lg-last floats them to the
             far right on desktop; on mobile they share the top row with the
             brand while the menu drops below (the toggler is hidden at ≥lg). -->
        <div class="header-controls order-lg-last">
            <app-language-switcher />
            <!-- Step 3: Toggle the value of the property when the toggler button is clicked. -->
            <button class="navbar-toggler cyan-action-button" type="button" aria-label="Menú"
                (click)="isMenuCollapsed.set(!isMenuCollapsed())">
                <svg class="hamburger-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 7h16M4 12h16M4 17h16" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" />
                </svg>
            </button>
        </div>

        <!-- Step 2: Add the ngbCollapse directive to the element below. -->
        <div [ngbCollapse]="isMenuCollapsed()" class="navbar-options collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <!-- Step 4: Close the menu when a link is clicked. -->
                    <a class="nav-link" routerLink="/blog" routerLinkActive="active" (click)="isMenuCollapsed.set(true)">{{ 'header.blog' | translate }}</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/form" routerLinkActive="active" (click)="isMenuCollapsed.set(true)">{{ 'header.contact' | translate }}</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/stats" routerLinkActive="active" (click)="isMenuCollapsed.set(true)">
                        {{ 'header.ourWork' | translate }}
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/event-of-the-month" routerLinkActive="active" (click)="isMenuCollapsed.set(true)">
                        {{ 'header.eventOfMonth' | translate }}
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
