<div class="blog-post" [@popAnimation]="loaded()" [ngClass]="{hidden: !loaded()}">
    @if (loaded()) {
    <a class="blog-back" routerLink="/blog" aria-label="Volver al blog">
      <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M19 12H5M11 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </a>
    <h2>{{title}}</h2>
    <div class="post-info">
        <div class="thumb-img-container">
            <img src="./../assets/imgs/Barba-wikiproyecto-lgbt.svg" alt="Título" class="post-image">
        </div>
        <div class="author-and-thumb">

            <span class="author">{{ 'blog.by' | translate }} <span class="author-name">{{author}}</span></span>
            <span class="date">{{date | dateFormat }}</span>
        </div>

    </div>
    <div class="post-content" [innerHTML]="content">
    </div>
    }
</div>

@if (error) {
<div class="blog-post">
    <h1 class="error-title">{{ 'blog.error404Title' | translate }}</h1>
    <span>{{ 'blog.postNotFound' | translate }}</span>
</div>
}
