<div class="blog-posts-container" [@popAnimation]="loaded() || error">
    @if (error) {
    <div class="blog-post">
        <h1 class="error-title">{{ 'blog.error500Title' | translate }}</h1>
        <span>{{ error | translate }}</span>
    </div>
    }
    @if (loaded() && !error) {
    @for (item of sortedPosts; track $index) {
    <a class="fill-link" routerLink="/blog/{{item.id}}">
        <div class="blog-post">
            <h2>{{item.title}}</h2>
            <div class="author">{{item.author}}</div>
            <div class="date">{{item.date | dateFormat }}</div>
        </div>
    </a>
    }
    }
</div>
