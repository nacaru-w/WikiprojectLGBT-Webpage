<div class="chart-container">
    <div class="chart-text">
        <p [innerHTML]="'stats.monthly.text1' | translate"></p>
        <span class="count-paragraph"><span class="count-text">{{thisMonthArticleCount}}</span> {{ 'stats.articlesUnit' | translate }}</span>
        <p>{{ 'stats.monthly.text2' | translate }}</p>
    </div>
    <div class="chart">
        <canvas id="monthlyArticlesChart">
            {{ monthlyArticlesChart }}
        </canvas>
    </div>
</div>
