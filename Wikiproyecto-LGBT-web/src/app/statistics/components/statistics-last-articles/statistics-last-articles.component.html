@if (showSpinner()) {
  <div class="spinner-container text-secondary">
    <div class="spinner-grow" role="status">
      <span class="visually-hidden">{{ 'common.loading' | translate }}</span>
    </div>
  </div>
}
@if (isDictFull(cardDict)) {
  <div class="card-container" style="display:flex;" [@popAnimation]="isDictFull(cardDict)">
    @for (item of cardDict | keyvalue; track item; let i = $index) {
      <div class="card" style="width: 18rem;">
        <div class="card-img-container">
          <img src={{item.value.image}} class="card-img-top" alt="...">
        </div>
        <div class="card-body">
          <h5 class="card-title">{{ item.key }}</h5>
          <p class="card-text">
            {{ item.value.extract }}
          </p>
          <a href='https://es.wikipedia.org/wiki/{{item.key}}' class="btn btn-primary">
            {{ 'common.viewOnWikipedia' | translate }}
          </a>
        </div>
      </div>
    }
  </div>
}
